name: Publish to PyPI

on:
  push:
    branches:
      - main  # Se dispara automáticamente al hacer push a main

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write      # Requerido para Trusted Publishing
      contents: write      # Requerido para que la IA pueda crear el release en tu repo

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Crucial para que lea el historial de commits

      # 1. Deja que la herramienta calcule la versión y actualice el pyproject.toml solo
      - name: Python Semantic Release
        id: semantic-release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: steps.semantic-release.outputs.released == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        if: steps.semantic-release.outputs.released == 'true'
        run: pip install build twine

      # 2. Compila el paquete (ya tendrá la versión nueva inyectada automáticamente)
      - name: Build package
        if: steps.semantic-release.outputs.released == 'true'
        run: python -m build

      - name: Check package
        if: steps.semantic-release.outputs.released == 'true'
        run: twine check dist/*

      # 3. Publica el release calculado
      - name: Publish to PyPI
        if: steps.semantic-release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1